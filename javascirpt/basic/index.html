<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>
<style>
body { font-family: Arial; display:flex; justify-content:center; padding:30px; background:#ad7d7d; }
.container { background:white; padding:20px; border-radius:10px; width:400px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
h2 { text-align:center; }
input, select, button { width:100%; padding:10px; margin:5px 0; border-radius:6px; border:1px solid #ccc; box-sizing:border-box; }
button { background:#0ea5a4; color:#f0e4e4; border:none; cursor:pointer; }
ul { list-style:none; padding:0; }
li { display:flex; justify-content:space-between; align-items:center; padding:10px; margin:6px 0; border-radius:6px; background:#f1f1f1; }
li.high { border-left:5px solid red; }
li.medium { border-left:5px solid orange; }
li.low { border-left:5px solid green; }
li.completed .taskText { text-decoration:line-through; color:gray; }
.deleteBtn { background:red; color:white; border:none; padding:5px 8px; border-radius:4px; cursor:pointer; }
</style>
</head>
<body>
<div class="container">
  <h2>To-Do List</h2>
  <input id="taskInput" placeholder="Madarchod name dal">
  <select id="priority">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>
  <button id="addBtn">Add Task</button>
  <ul id="taskList"></ul>
</div>

<script>
const taskInput=document.getElementById("taskInput"), priority=document.getElementById("priority"), addBtn=document.getElementById("addBtn"), taskList=document.getElementById("taskList");

addBtn.onclick=addTask;
taskInput.onkeydown=e=>{ if(e.key==="Enter") addTask(); }

function addTask(){
  const val=taskInput.value.trim();
  if(!val) return;
  const li=document.createElement("li");
  li.className=priority.value;
  li.innerHTML=`<span class="taskText">${val}</span>
  <div><input type="checkbox" class="completeCheck"> <button class="deleteBtn">Delete</button></div>`;
  
  li.querySelector(".deleteBtn").onclick=()=>li.remove();
  li.querySelector(".completeCheck").onchange=function(){
    li.classList.toggle("completed", this.checked);
  }

  taskList.appendChild(li);
  taskInput.value="";
  taskInput.focus();
}
</script>
</body>
</html>
