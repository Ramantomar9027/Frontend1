<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #ad7d7d;
            display: flex;
            justify-content: center;
            padding: 30px;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 400px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h2 { text-align: center; }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            background-color: #0ea5a4;
            color: rgb(240, 228, 228);
            border: none;
            cursor: pointer;
        }
        ul {
            list-style: none;
            padding-left: 0;
        }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            margin: 6px 0;
            border-radius: 6px;
            background: #f1f1f1;
        }
        li.high { border-left: 5px solid red; }
        li.medium { border-left: 5px solid orange; }
        li.low { border-left: 5px solid green; }
        li.completed .taskText {
            text-decoration: line-through;
            color: gray;
        }
        .deleteBtn {
            background: red;
            color: white;
            border: none;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>To-Do List</h2>

    <input type="text" id="taskInput" placeholder="Enter task">
    
    <select id="priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
    </select>

    <button id="addBtn">Add Task</button>

    <ul id="taskList"></ul>
</div>

<script>
const taskInput = document.getElementById("taskInput");
const priority = document.getElementById("priority");
const addBtn = document.getElementById("addBtn");
const taskList = document.getElementById("taskList");

addBtn.addEventListener("click", addTask);
taskInput.addEventListener("keydown", function(e) {
    if(e.key === "Enter") addTask();
});

function addTask() {
    const taskValue = taskInput.value.trim();
    if(!taskValue) return;

    const li = document.createElement("li");
    li.className = priority.value;

    li.innerHTML = `
        <span class="taskText">${taskValue}</span>
        <div>
            <input type="checkbox" class="completeCheck"> 
            <button class="deleteBtn">Delete</button>
        </div>
    `;

    li.querySelector(".deleteBtn").addEventListener("click", () => li.remove());

    li.querySelector(".completeCheck").addEventListener("change", function() {
        if(this.checked) li.classList.add("completed");
        else li.classList.remove("completed");
    });

    taskList.appendChild(li);
    taskInput.value = "";
    taskInput.focus();
}
</script>

</body>
</html>
